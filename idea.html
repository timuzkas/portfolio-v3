<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Draw Something Real</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #0a0a0a;
        --fg: #f2f2f2;
        --dim: #737373;
        --border: rgba(255, 255, 255, 0.1);
        --accent: #a3a3a3;
        --ease: cubic-bezier(0.16, 1, 0.3, 1);
      }

      [data-theme="light"] {
        --bg: #f5f5f5;
        --fg: #1a1a1a;
        --dim: #888888;
        --border: rgba(0, 0, 0, 0.1);
      }

      html {
        font-size: 16px;
      }

      body {
        font-family: 'Syne', sans-serif;
        background: var(--bg);
        color: var(--fg);
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition:
          background 0.8s var(--ease),
          color 0.8s var(--ease);
        overflow-x: hidden;
      }

      .container {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 800px;
        padding: 0 24px;
        display: flex;
        flex-direction: column;
        min-height: 100dvh;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 40px 0;
      }

      .logo {
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        text-transform: lowercase;
      }

      .theme-btn {
        background: none;
        border: none;
        color: var(--dim);
        cursor: pointer;
        font-size: 0.75rem;
        font-weight: 500;
        transition: color 0.3s ease;
      }

      .theme-btn:hover {
        color: var(--fg);
      }

      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 64px;
        padding-bottom: 80px;
      }

      .categories {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-start;
      }

      .cat {
        background: none;
        border: 1px solid var(--border);
        color: var(--dim);
        font-family: 'Syne', sans-serif;
        font-size: 0.7rem;
        font-weight: 500;
        padding: 6px 14px;
        cursor: pointer;
        border-radius: 4px;
        transition: all 0.3s var(--ease);
      }

      .cat:hover {
        border-color: var(--dim);
        color: var(--fg);
      }

      .cat.active {
        background: var(--fg);
        color: var(--bg);
        border-color: var(--fg);
      }

      .idea-wrap {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .idea-label {
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--dim);
        text-transform: lowercase;
        opacity: 0;
        transform: translateY(10px);
        transition: all 0.6s var(--ease);
      }

      .idea-label.visible {
        opacity: 1;
        transform: none;
      }

      .idea-text {
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 800;
        line-height: 1.1;
        letter-spacing: -0.04em;
        min-height: 3em;
      }

      .idea-text .placeholder {
        font-weight: 400;
        color: var(--dim);
      }

      .idea-text .word {
        display: inline-block;
        opacity: 0;
        transform: translateY(20px);
        animation: wordUp 0.6s var(--ease) forwards;
      }

      @keyframes wordUp {
        to {
          opacity: 1;
          transform: none;
        }
      }

      .idea-hint {
        font-size: 1.1rem;
        font-weight: 500;
        color: var(--dim);
        line-height: 1.4;
        max-width: 500px;
        opacity: 0;
        transform: translateY(10px);
        transition: all 0.8s var(--ease) 0.2s;
      }

      .idea-hint.visible {
        opacity: 1;
        transform: none;
      }

      .diff {
        display: flex;
        gap: 6px;
        opacity: 0;
        transition: opacity 0.6s ease 0.4s;
      }

      .diff.visible {
        opacity: 1;
      }

      .diff-dot {
        width: 6px;
        height: 6px;
        background: var(--border);
        transition: all 0.4s var(--ease);
      }

      .diff-dot.on {
        background: var(--fg);
        transform: scale(1.2);
      }

      .gen-btn {
        background: none;
        border: none;
        color: var(--fg);
        font-family: 'Syne', sans-serif;
        font-size: 1.5rem;
        font-weight: 700;
        cursor: pointer;
        padding: 20px 0;
        text-align: left;
        display: inline-flex;
        align-items: center;
        gap: 1rem;
        transition: gap 0.4s var(--ease);
        width: fit-content;
      }

      .gen-btn::after {
        content: '→';
        transition: transform 0.4s var(--ease);
      }

      .gen-btn:hover {
        gap: 1.5rem;
      }

      .hist-btn {
        position: fixed;
        bottom: 40px;
        right: 40px;
        background: none;
        border: none;
        color: var(--dim);
        font-family: 'Syne', sans-serif;
        font-size: 0.75rem;
        font-weight: 700;
        cursor: pointer;
        transition: color 0.3s ease;
      }

      .hist-btn:hover {
        color: var(--fg);
      }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 15;
        background: var(--bg);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s var(--ease);
      }

      .overlay.open {
        opacity: 0.95;
        pointer-events: auto;
      }

      .hist-panel {
        position: fixed;
        inset: 0;
        z-index: 20;
        padding: 8vw 5vw;
        transform: translateY(20px);
        opacity: 0;
        pointer-events: none;
        transition: all 0.6s var(--ease);
        overflow-y: auto;
      }

      .hist-panel.open {
        opacity: 1;
        transform: none;
        pointer-events: auto;
      }

      .hist-inner {
        max-width: 800px;
        margin: 0 auto;
      }

      .hist-head {
        display: flex;
        justify-content: space-between;
        margin-bottom: 48px;
      }

      .hist-title {
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .hist-close {
        background: none;
        border: none;
        color: var(--fg);
        cursor: pointer;
        font-size: 1.5rem;
      }

      .hist-item {
        padding: 24px 0;
        border-bottom: 1px solid var(--border);
      }

      .hist-item .hist-cat {
        font-size: 0.7rem;
        font-weight: 700;
        color: var(--dim);
        display: block;
        margin-bottom: 8px;
      }

      .hist-item-text {
        font-size: 1.25rem;
        font-weight: 500;
        line-height: 1.3;
      }

      footer {
        padding: 40px 0;
        font-size: 0.75rem;
        color: var(--dim);
      }

      @media (max-width: 600px) {
        main {
          gap: 48px;
        }
        .hist-btn {
          bottom: 24px;
          right: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="logo">draw something real</div>
        <button class="theme-btn" id="themeBtn">light</button>
      </header>

      <main>
        <div class="categories" id="cats"></div>

        <div class="idea-wrap">
          <div class="idea-label" id="label">category</div>
          <div class="idea-text" id="idea">
            <span class="placeholder">press generate or space</span>
          </div>
          <div class="idea-hint" id="hint"></div>
          <div class="diff" id="diff">
            <div class="diff-dot"></div>
            <div class="diff-dot"></div>
            <div class="diff-dot"></div>
            <div class="diff-dot"></div>
            <div class="diff-dot"></div>
          </div>
        </div>

        <div class="gen-wrap">
          <button class="gen-btn" id="genBtn">Generate idea</button>
        </div>
      </main>

      <footer>© 2026 // for the artists</footer>
    </div>

    <button class="hist-btn" id="histBtn">
      history (<span id="histNum">0</span>)
    </button>
    <div class="overlay" id="overlay"></div>
    <div class="hist-panel" id="histPanel">
      <div class="hist-inner">
        <div class="hist-head">
          <span class="hist-title">recent ideas</span>
          <button class="hist-close" id="histClose">✕</button>
        </div>
        <div class="hist-list" id="histList"></div>
      </div>
    </div>

    <script>
      const IDEAS = {
        "Everyday Life": [
          { text: "Your morning coffee, half-finished, from directly above", hint: "Focus on the liquid surface. Make the mundane feel monumental.", difficulty: 2 },
          { text: "The view from your window at the hour you hate most", hint: "Capture the light honestly. What makes that hour feel heavy?", difficulty: 2 },
          { text: "Someone sleeping on public transport", hint: "The awkward angle of the neck. Keep it tender.", difficulty: 3 },
          { text: "A kitchen counter after cooking a real meal", hint: "The chaos: peels, splatters. Tell the story of the meal.", difficulty: 3 },
          { text: "Your shoes, worn down and honest", hint: "Draw every scuff. A portrait of how you move.", difficulty: 2 },
          { text: "Your unmade bed from a low angle", hint: "Make the wrinkles in the sheets feel like a landscape.", difficulty: 2 }
        ],
        "People & Faces": [
          { text: "A face drawn from memory of someone you saw today", hint: "Memory distorts beautifully. Embrace the errors.", difficulty: 3 },
          { text: "Self-portrait using only your non-dominant hand", hint: "Let go of perfection. The shakiness adds character.", difficulty: 2 },
          { text: "The back of someone's head", hint: "Posture says more than faces. Portraits don't need eyes.", difficulty: 3 },
          { text: "An elderly person's hands in detail", hint: "Every wrinkle is a line of their story. Take your time.", difficulty: 5 }
        ],
        "Organic": [
          { text: "A single tree passed every day", hint: "No lollipop trees. Look at the actual structural bones.", difficulty: 3 },
          { text: "A piece of fruit rotting", hint: "The texture shift where firm becomes soft. Decay has detail.", difficulty: 4 },
          { text: "Weeds through a crack in concrete", hint: "The tension between hard and soft. Tiny and epic.", difficulty: 3 }
        ],
        "Conceptual": [
          { text: "Draw a sound you heard today", hint: "No symbols. Translate audio into pure visual form.", difficulty: 5 },
          { text: "The weight of something heavy", hint: "Draw the compression and the strain, not the object.", difficulty: 5 },
          { text: "What 3AM feels like as a landscape", hint: "The actual sensation—vast, suffocating, or still.", difficulty: 4 }
        ]
      };

      const cats = Object.keys(IDEAS);
      let activeCat = "all";
      let history = [];
      let last = null;

      const catsEl = document.getElementById("cats");
      const ideaEl = document.getElementById("idea");
      const labelEl = document.getElementById("label");
      const hintEl = document.getElementById("hint");
      const diffEl = document.getElementById("diff");
      const dots = diffEl.children;
      const genBtn = document.getElementById("genBtn");
      const themeBtn = document.getElementById("themeBtn");
      const histBtn = document.getElementById("histBtn");
      const histPanel = document.getElementById("histPanel");
      const histList = document.getElementById("histList");
      const histNum = document.getElementById("histNum");
      const overlay = document.getElementById("overlay");

      function buildCats() {
        const all = mk("button", "cat active", "all");
        all.dataset.cat = "all";
        catsEl.appendChild(all);
        cats.forEach(c => {
          const b = mk("button", "cat", c.toLowerCase());
          b.dataset.cat = c;
          catsEl.appendChild(b);
        });
      }

      function mk(tag, cls, txt) {
        const el = document.createElement(tag);
        el.className = cls;
        if (txt) el.textContent = txt;
        return el;
      }

      catsEl.addEventListener("click", e => {
        const t = e.target.closest(".cat");
        if (!t) return;
        catsEl.querySelectorAll(".cat").forEach(c => c.classList.remove("active"));
        t.classList.add("active");
        activeCat = t.dataset.cat;
      });

      function generate() {
        const p = activeCat === "all" 
          ? cats.flatMap(c => IDEAS[c].map(i => ({ ...i, category: c })))
          : IDEAS[activeCat].map(i => ({ ...i, category: activeCat }));

        let idea;
        do { idea = p[Math.floor(Math.random() * p.length)]; }
        while (p.length > 1 && last && idea.text === last.text);
        last = idea;

        labelEl.classList.remove("visible");
        hintEl.classList.remove("visible");
        diffEl.classList.remove("visible");

        requestAnimationFrame(() => {
          const words = idea.text.split(" ");
          ideaEl.innerHTML = words
            .map((w, i) => `<span class="word" style="animation-delay:${i * 0.04}s">${w}&nbsp;</span>`)
            .join("");

          setTimeout(() => {
            labelEl.textContent = idea.category.toLowerCase();
            labelEl.classList.add("visible");
            hintEl.textContent = idea.hint;
            hintEl.classList.add("visible");
            diffEl.classList.add("visible");
          }, 50);

          Array.from(dots).forEach((d, i) => {
            d.classList.toggle("on", i < idea.difficulty);
          });
        });

        history.unshift({ text: idea.text, category: idea.category });
        histNum.textContent = history.length;
      }

      genBtn.addEventListener("click", generate);
      document.addEventListener("keydown", e => { if (e.code === "Space") { e.preventDefault(); generate(); } });

      themeBtn.addEventListener("click", () => {
        const t = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
        document.documentElement.dataset.theme = t;
        themeBtn.textContent = t;
      });

      histBtn.addEventListener("click", () => {
        histList.innerHTML = history.map(h => `
          <div class="hist-item">
            <span class="hist-cat">${h.category.toLowerCase()}</span>
            <div class="hist-item-text">${h.text}</div>
          </div>
        `).join("");
        histPanel.classList.add("open");
        overlay.classList.add("open");
      });

      [document.getElementById("histClose"), overlay].forEach(el => 
        el.addEventListener("click", () => {
          histPanel.classList.remove("open");
          overlay.classList.remove("open");
        })
      );

      buildCats();
    </script>
  </body>
</html>
