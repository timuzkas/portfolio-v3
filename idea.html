<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Draw Something Real</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap");

  *,
  *::before,
  *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #0b0b0b;
    --fg: #e8e6e0;
    --dim: #555;
    --border: #1e1e1e;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  [data-theme="light"] {
    --bg: #f2f0eb;
    --fg: #111;
    --dim: #999;
    --border: #ddd;
  }

  html { font-size: 16px; }

  body {
    font-family: "Inter", sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: background 0.8s var(--ease), color 0.8s var(--ease);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* --- ambient glow --- */
  .glow {
    position: fixed;
    width: 50vmax;
    height: 50vmax;
    border-radius: 50%;
    background: radial-gradient(circle, var(--fg), transparent 70%);
    opacity: 0.018;
    top: 50%;
    left: 50%;
    translate: -50% -50%;
    pointer-events: none;
    transition: opacity 1.5s ease;
    animation: breathe 10s ease-in-out infinite;
  }

  [data-theme="light"] .glow { opacity: 0.03; }

  @keyframes breathe {
    0%, 100% { scale: 1; }
    50% { scale: 1.15; }
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  /* --- header --- */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 32px 0 0;
  }

  .logo {
    font-size: 0.65rem;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--dim);
    transition: color 0.8s var(--ease);
  }

  .theme-btn {
    background: none;
    border: none;
    color: var(--dim);
    cursor: pointer;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-family: "Inter", sans-serif;
    padding: 8px 0;
    transition: color 0.4s ease;
  }

  .theme-btn:hover { color: var(--fg); }

  /* --- main --- */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px 0;
    gap: 56px;
    text-align: center;
  }

  /* --- categories --- */
  .categories {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }

  .cat {
    background: none;
    border: none;
    color: var(--dim);
    font-family: "Inter", sans-serif;
    font-size: 0.72rem;
    font-weight: 400;
    padding: 6px 14px;
    cursor: pointer;
    border-radius: 100px;
    transition: color 0.4s ease, opacity 0.4s ease;
    letter-spacing: 0.01em;
  }

  .cat:hover { color: var(--fg); }

  .cat.active {
    color: var(--fg);
    background: var(--border);
    transition: all 0.5s var(--ease);
  }

  /* --- idea --- */
  .idea-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    max-width: 600px;
  }

  .idea-label {
    font-size: 0.6rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
    opacity: 0;
    transform: translateY(-6px);
    transition: all 0.6s var(--ease);
  }

  .idea-label.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .idea-text {
    font-family: "Instrument Serif", serif;
    font-weight: 400;
    font-size: clamp(1.8rem, 5.5vw, 3.2rem);
    line-height: 1.2;
    letter-spacing: -0.01em;
    min-height: 2.8em;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  .idea-text .placeholder {
    font-family: "Inter", sans-serif;
    font-size: 0.85rem;
    font-weight: 300;
    color: var(--dim);
    letter-spacing: 0.02em;
  }

  .idea-text .word {
    display: inline-block;
    opacity: 0;
    transform: translateY(20px);
    animation: wordUp 0.55s var(--ease) forwards;
  }

  @keyframes wordUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .idea-hint {
    font-size: 0.8rem;
    font-weight: 300;
    color: var(--dim);
    line-height: 1.65;
    max-width: 440px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.7s var(--ease) 0.3s;
  }

  .idea-hint.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* --- difficulty --- */
  .diff {
    display: flex;
    gap: 4px;
    align-items: center;
    opacity: 0;
    transition: opacity 0.6s ease 0.4s;
  }

  .diff.visible { opacity: 1; }

  .diff-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.5s var(--ease), transform 0.5s var(--ease);
  }

  .diff-dot.on {
    background: var(--dim);
    transform: scale(1.3);
  }

  /* --- generate --- */
  .gen-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .gen-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--fg);
    font-family: "Inter", sans-serif;
    font-size: 0.78rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    padding: 14px 40px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.5s var(--ease);
    position: relative;
  }

  .gen-btn:hover {
    border-color: var(--fg);
    padding: 14px 52px;
  }

  .gen-btn:active {
    scale: 0.96;
    transition-duration: 0.1s;
  }

  .gen-shortcut {
    font-size: 0.6rem;
    color: var(--dim);
    letter-spacing: 0.06em;
    opacity: 0.6;
    transition: color 0.8s var(--ease);
  }

  /* --- history --- */
  .hist-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: none;
    border: none;
    color: var(--dim);
    font-family: "Inter", sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 10px;
    transition: color 0.3s ease;
    z-index: 10;
  }

  .hist-btn:hover { color: var(--fg); }

  .overlay {
    position: fixed;
    inset: 0;
    z-index: 15;
    background: var(--bg);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s var(--ease);
  }

  .overlay.open { opacity: 0.85; pointer-events: auto; }

  .hist-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 20;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 32px 24px 40px;
    transform: translateY(100%);
    transition: transform 0.7s var(--ease), background 0.8s var(--ease), border-color 0.8s var(--ease);
    max-height: 50dvh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .hist-panel.open { transform: translateY(0); }

  .hist-inner {
    width: 100%;
    max-width: 500px;
  }

  .hist-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .hist-title {
    font-size: 0.6rem;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .hist-close {
    background: none;
    border: none;
    color: var(--dim);
    cursor: pointer;
    font-size: 0.85rem;
    transition: color 0.3s ease;
  }

  .hist-close:hover { color: var(--fg); }

  .hist-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .hist-item {
    font-family: "Instrument Serif", serif;
    font-size: 1rem;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    opacity: 0;
    transform: translateY(8px);
    animation: fadeUp 0.4s var(--ease) forwards;
    cursor: default;
  }

  .hist-item .hist-cat {
    font-family: "Inter", sans-serif;
    font-size: 0.55rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--dim);
    display: block;
    margin-bottom: 4px;
  }

  .hist-empty {
    color: var(--dim);
    font-size: 0.78rem;
    font-weight: 300;
    font-style: italic;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* --- line --- */
  .line {
    width: 32px;
    height: 1px;
    background: var(--border);
    transition: background 0.8s var(--ease);
  }

  /* --- footer --- */
  footer {
    text-align: center;
    padding: 0 0 32px;
    font-size: 0.6rem;
    color: var(--dim);
    letter-spacing: 0.04em;
    font-weight: 300;
    transition: color 0.8s var(--ease);
  }

  @media (max-width: 500px) {
    main { padding: 60px 0; gap: 44px; }
    .gen-shortcut { display: none; }
  }
</style>
</head>
<body>
  <div class="glow"></div>

  <div class="container">
    <header>
      <div class="logo">Draw something real</div>
      <button class="theme-btn" id="themeBtn">Light</button>
    </header>

    <main>
      <div class="categories" id="cats"></div>

      <div class="idea-wrap">
        <div class="idea-label" id="label"></div>
        <div class="idea-text" id="idea">
          <span class="placeholder">press generate, or spacebar</span>
        </div>
        <div class="idea-hint" id="hint"></div>
        <div class="diff" id="diff">
          <div class="diff-dot"></div>
          <div class="diff-dot"></div>
          <div class="diff-dot"></div>
          <div class="diff-dot"></div>
          <div class="diff-dot"></div>
        </div>
      </div>

      <div class="gen-wrap">
        <button class="gen-btn" id="genBtn">Generate</button>
        <span class="gen-shortcut">spacebar</span>
      </div>
    </main>

    <footer>for people who actually draw</footer>
  </div>

  <button class="hist-btn" id="histBtn">History · <span id="histNum">0</span></button>
  <div class="overlay" id="overlay"></div>
  <div class="hist-panel" id="histPanel">
    <div class="hist-inner">
      <div class="hist-head">
        <span class="hist-title">Recent</span>
        <button class="hist-close" id="histClose">✕</button>
      </div>
      <div class="hist-list" id="histList">
        <div class="hist-empty">Nothing yet</div>
      </div>
    </div>
  </div>

<script>
const IDEAS = {
  "Everyday": [
    { text: "Your morning coffee, half-finished, from directly above", hint: "Focus on the ring stain, the shadow, the liquid surface. Make the mundane feel monumental.", difficulty: 2 },
    { text: "The view from your window at the hour you like least", hint: "Capture the light honestly. What makes that hour feel heavy or dull?", difficulty: 2 },
    { text: "Your shoes, worn down and honest", hint: "Draw every scuff, every crease. These are a portrait of how you move.", difficulty: 2 },
  ],
  "People": [
    { text: "A face drawn entirely from memory of someone you saw today", hint: "You'll get things wrong—that's the point. Memory distorts beautifully.", difficulty: 3 },
    { text: "Self-portrait using only your non-dominant hand", hint: "Let go of perfection. The shakiness adds character you can't fake.", difficulty: 2 },
    { text: "An elderly person's hands in detail", hint: "Every vein, wrinkle, and age spot is a line of their story.", difficulty: 5 },
  ],
  "Nature": [
    { text: "A single tree you pass every day, like it's the first time", hint: "Actually look at how the branches split. No lollipop trees—real structure.", difficulty: 3 },
    { text: "A piece of fruit rotting—not disgusting, just honest about time", hint: "The texture shift where firm becomes soft. Decay has incredible detail.", difficulty: 4 },
    { text: "A rock. Just a rock. But make someone care about it.", hint: "Weight, texture, the way light falls on a simple form.", difficulty: 3 },
  ],
  "Objects": [
    { text: "A crumpled piece of paper, lit from one side", hint: "Pure study of planes and shadow. Simple subject, complex light.", difficulty: 3 },
    { text: "Something you'd grab in a fire", hint: "What is it and why? Let that answer guide how you draw it.", difficulty: 2 },
    { text: "Tangled earphones or cables", hint: "Follow each strand through the mess. Meditative and maddening.", difficulty: 4 },
  ],
  "Spaces": [
    { text: "A room you remember from childhood, from memory", hint: "Don't reference photos. Let your memory distort. That distortion is interesting.", difficulty: 3 },
    { text: "A doorway with light spilling through into a dark room", hint: "High contrast. The rectangle of light. What's visible vs what hides.", difficulty: 3 },
    { text: "The corner where two walls and the floor meet", hint: "Where dust gathers. Where light behaves strangely. The overlooked geometry.", difficulty: 2 },
  ],
  "Conceptual": [
    { text: "Draw a sound you heard today without using any symbols", hint: "No music notes, no speech bubbles. Translate audio into pure visual form.", difficulty: 5 },
    { text: "What 3AM feels like as a landscape", hint: "Not a clock. The actual sensation—vast, suffocating, or still.", difficulty: 4 },
    { text: "The space an object used to occupy—draw the absence", hint: "A dent in a cushion, a clean rectangle on a dusty shelf. The ghost of a thing.", difficulty: 4 },
  ],
};

const cats = Object.keys(IDEAS);
let activeCat = "all";
let history = [];
let last = null;

const catsEl = document.getElementById("cats");
const ideaEl = document.getElementById("idea");
const labelEl = document.getElementById("label");
const hintEl = document.getElementById("hint");
const diffEl = document.getElementById("diff");
const dots = diffEl.children;
const genBtn = document.getElementById("genBtn");
const themeBtn = document.getElementById("themeBtn");
const histBtn = document.getElementById("histBtn");
const histPanel = document.getElementById("histPanel");
const histClose = document.getElementById("histClose");
const histList = document.getElementById("histList");
const histNum = document.getElementById("histNum");
const overlay = document.getElementById("overlay");

function buildCats() {
  const all = mk("button", "cat active", "All");
  all.dataset.cat = "all";
  catsEl.appendChild(all);
  cats.forEach(c => {
    const b = mk("button", "cat", c);
    b.dataset.cat = c;
    catsEl.appendChild(b);
  });
}

function mk(tag, cls, txt) {
  const el = document.createElement(tag);
  el.className = cls;
  if (txt) el.textContent = txt;
  return el;
}

catsEl.addEventListener("click", e => {
  const t = e.target.closest(".cat");
  if (!t) return;
  catsEl.querySelectorAll(".cat").forEach(c => c.classList.remove("active"));
  t.classList.add("active");
  activeCat = t.dataset.cat;
});

function pool() {
  if (activeCat === "all")
    return cats.flatMap(c => IDEAS[c].map(i => ({ ...i, category: c })));
  return IDEAS[activeCat].map(i => ({ ...i, category: activeCat }));
}

function generate() {
  const p = pool();
  let idea;
  do { idea = p[Math.floor(Math.random() * p.length)]; }
  while (p.length > 1 && last && idea.text === last.text);
  last = idea;

  // label
  labelEl.classList.remove("visible");
  hintEl.classList.remove("visible");
  diffEl.classList.remove("visible");

  requestAnimationFrame(() => {
    // words
    const words = idea.text.split(" ");
    ideaEl.innerHTML = words
      .map((w, i) => `<span class="word" style="animation-delay:${i * 0.045}s">${w}&nbsp;</span>`)
      .join("");

    setTimeout(() => {
      labelEl.textContent = idea.category;
      labelEl.classList.add("visible");
      hintEl.textContent = idea.hint;
      hintEl.classList.add("visible");
      diffEl.classList.add("visible");
    }, 80);

    Array.from(dots).forEach((d, i) => {
      setTimeout(() => d.classList.toggle("on", i < idea.difficulty), i * 50 + 100);
    });
  });

  history.unshift({ text: idea.text, category: idea.category });
  if (history.length > 40) history.pop();
  histNum.textContent = history.length;
}

genBtn.addEventListener("click", generate);

document.addEventListener("keydown", e => {
  if (e.code === "Space" && !e.target.closest("button, input, textarea")) {
    e.preventDefault();
    generate();
  }
});

// theme
function setTheme(t) {
  document.documentElement.dataset.theme = t;
  themeBtn.textContent = t === "dark" ? "Light" : "Dark";
  localStorage.setItem("theme", t);
}

themeBtn.addEventListener("click", () => {
  setTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark");
});

(function () {
  const s = localStorage.getItem("theme");
  if (s) setTheme(s);
})();

// history panel
function openHist() {
  histList.innerHTML = "";
  if (!history.length) {
    histList.innerHTML = '<div class="hist-empty">Nothing yet</div>';
  } else {
    history.forEach((h, i) => {
      const d = document.createElement("div");
      d.className = "hist-item";
      d.style.animationDelay = i * 0.03 + "s";
      d.innerHTML = `<span class="hist-cat">${h.category}</span>${h.text}`;
      histList.appendChild(d);
    });
  }
  histPanel.classList.add("open");
  overlay.classList.add("open");
}

function closeHist() {
  histPanel.classList.remove("open");
  overlay.classList.remove("open");
}

histBtn.addEventListener("click", openHist);
histClose.addEventListener("click", closeHist);
overlay.addEventListener("click", closeHist);

buildCats();
</script>
</body>
</html>
